version: 1
backend:
  phases:
    build:
      commands:
        - echo "Backend deployed via local sandbox. Skipping CI/CD backend deployment."
frontend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npm run build
        - node scripts/upload-logo.js
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
