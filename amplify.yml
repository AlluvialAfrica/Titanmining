version: 1
backend:
  phases:
    build:
      commands:
        - echo "Skipping backend deployment due to sandbox SSM bootstrap restrictions..."
frontend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npm run build
        - node scripts/upload-logo.js
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*